<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DRILL & SIMULASI N3</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e9eef2;
      color: #172033;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: #e9eef2;
    }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      width: min(920px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #ccd6df;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 42, 55, 0.06);
      padding: 24px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: #607086;
      font-size: 14px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sub {
      margin: 10px 0 0;
      color: #526277;
      line-height: 1.55;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .lesson {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
      padding: 16px;
      border: 1px solid #ccd6df;
      border-radius: 8px;
      color: #172033;
      text-decoration: none;
      background: #f7f9fb;
    }

    .lesson:hover {
      border-color: #172033;
      background: #ffffff;
    }

    .lesson strong {
      display: block;
      font-size: 20px;
    }

    .lesson span {
      display: block;
      margin-top: 4px;
      color: #607086;
      font-size: 14px;
    }

    .arrow {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: #172033;
      color: #ffffff;
      font-weight: 900;
    }

    .empty {
      color: #607086;
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 620px) {
      .page { padding: 14px; }
      .panel { padding: 18px; }
      .lesson { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="panel">
        <p class="eyebrow">wiraaku</p>
        <h1>DRILL & SIMULASI N3</h1>
        <p class="sub">Pilih latihan yang ingin dikerjakan.</p>
      </section>

      <section class="panel">
        <p class="eyebrow">Daftar latihan</p>
        <div class="list">
          <a class="lesson" href="exercises/1-kanji-yomi.html">
            <div>
              <strong>1. 漢字読み</strong>
              <span>Kuis interaktif 80 soal</span>
            </div>
            <div class="arrow" aria-hidden="true">→</div>
          </a>
          <a class="lesson" href="exercises/2-hyouki-kanji.html">
            <div>
              <strong>2. 表記 (漢字)</strong>
              <span>Kuis interaktif 90 soal</span>
            </div>
            <div class="arrow" aria-hidden="true">→</div>
          </a>
          <a class="lesson" href="exercises/3-bunmyaku-kitei.html">
            <div>
              <strong>3. 文脈規定</strong>
              <span>Kuis interaktif 110 soal</span>
            </div>
            <div class="arrow" aria-hidden="true">→</div>
          </a>
          <a class="lesson" href="exercises/4-iikae-ruigi.html">
            <div>
              <strong>4. 言い換え類義</strong>
              <span>Kuis interaktif 75 soal</span>
            </div>
            <div class="arrow" aria-hidden="true">→</div>
          </a>
          <a class="lesson" href="exercises/5-youhou.html">
            <div>
              <strong>5. 用法</strong>
              <span>Kuis interaktif 50 soal</span>
            </div>
            <div class="arrow" aria-hidden="true">→</div>
          </a>
          <p class="empty">tunggu update latihan berikutnya</p>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
