<!doctype html>
<html lang="id">
<head>

  <title>2. 表記 (漢字)</title>
  <style>
    :root {
      color-scheme: light;

      background: #e9eef2;
      color: #172033;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #e9eef2; }
    button { font: inherit; }

    .page { min-height: 100vh; padding: 24px; }
    .wrap { width: min(1040px, 100%); margin: 0 auto; display: grid; gap: 18px; }
    .panel {
      background: #ffffff;
      border: 1px solid #ccd6df;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 42, 55, 0.06);
      padding: 24px;
    }

    .top, .quiz-head, .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: nowrap;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: #607086;
      font-size: 14px;
      font-weight: 800;
    }

    h1 { margin: 0; font-size: clamp(26px, 3vw, 36px); line-height: 1.1; letter-spacing: 0; }
    .sub { margin: 8px 0 0; color: #526277; font-size: 15px; line-height: 1.5; }

    .back {
      color: #172033;
      font-weight: 800;
      text-decoration: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(86px, 1fr));
      gap: 10px;
      min-width: min(470px, 100%);
    }

    .stat {
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 12px;
      text-align: center;
    }

    .stat span { display: block; color: #65758b; font-size: 12px; font-weight: 800; }
    .stat strong { display: block; margin-top: 2px; font-size: 24px; line-height: 1.2; }

    .progress {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #d4dde6;
      margin-top: 22px;
    }

    .progress > div {
      width: 0;
      height: 100%;
      background: #172033;
      transition: width 180ms ease;
    }

    .question-no { color: #607086; font-size: 14px; font-weight: 800; }
    .segmented, .action-group, .quiz-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .quiz-tools { justify-content: flex-end; }
    .timer-tools { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
    .timer-input { width: 92px; min-height: 42px; border: 1px solid #c7d2dc; border-radius: 8px; padding: 0 10px; }
    #timerDisplay {
      font-size: clamp(24px, 3.2vw, 34px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      min-width: 110px;
      text-align: right;
    }

    .btn {
      border: 1px solid #c7d2dc;
      border-radius: 8px;
      background: #ffffff;
      color: #172033;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .btn:hover:not(:disabled) { border-color: #172033; transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.primary, .btn.active { background: #172033; border-color: #172033; color: #ffffff; }
    .btn.danger { background: #fff7f8; border-color: #e1abb5; color: #a32238; }
    .btn.danger:hover:not(:disabled) { border-color: #a32238; }

    .question-text {
      margin: 22px 0;
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 18px;
      font-size: 22px;
      line-height: 1.8;
    }
    .marked {
      font-weight: 800;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 62px;
      border: 2px solid #c8d2dc;
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
      cursor: pointer;
      font-size: 24px;
      font-weight: 500;
      transition: border-color 150ms ease, background 150ms ease;
    }
    .badge {
      display: inline-grid;
      place-items: center;
      flex: 0 0 30px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: #e9eef2;
      font-size: 14px;
      font-weight: 800;
    }
    .choice-text { font-size: 24px; font-weight: 400; }

    .choice:hover { border-color: #172033; }
    .choice.correct { background: #edf9f1; border-color: #24935d; }
    .choice.wrong { background: #fff0f2; border-color: #d53b57; }

    .review.show { display: block; }

    .review { display: none; }
    .review h2 { margin: 0 0 8px; font-size: 22px; }
    .review-intro { margin: 0 0 16px; color: #526277; font-size: 14px; line-height: 1.5; }
    .review-item {
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 14px;
      line-height: 1.55;
    }
    .review-item strong { display: block; margin-bottom: 5px; }
    .review-note { margin-top: 5px; color: #526277; font-size: 14px; }
    .ok { color: #137346; font-weight: 800; }
    .no { color: #ba2440; font-weight: 800; }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(44px, 1fr));
      gap: 8px;
    }

    .nav-btn {
      border: 1px solid #ccd6df;
      border-radius: 8px;
      background: #f3f6f8;
      min-height: 40px;
      font-weight: 800;
      cursor: pointer;
    }

    .nav-btn.current { outline: 2px solid #172033; outline-offset: 1px; }
    .nav-btn.answered { background: #e3efff; border-color: #7aa8e8; }
    .nav-btn.correct { background: #dff4e7; border-color: #78c596; }
    .nav-btn.wrong { background: #ffe2e7; border-color: #e77c8e; }

    @media (max-width: 760px) {
      .page { padding: 14px; }
      .panel { padding: 18px; }
      .top { align-items: stretch; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, 1fr); min-width: 0; }
      .quiz-tools { width: 100%; justify-content: stretch; }
      .segmented { flex: 1 1 auto; }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .actions { align-items: stretch; flex-wrap: nowrap; }
      .actions > .btn, .action-group { width: 100%; }
      .action-group .btn { flex: 1 1 130px; }
      .nav-grid { grid-template-columns: repeat(5, minmax(44px, 1fr)); }
    }
  </style>
</head>

  <main class="page">
    <div class="wrap">
      <section class="panel">
        <a class="back" href="../index.html">← Menu utama</a>
        <div class="top" style="margin-top: 12px;">
          <div>
            <p class="eyebrow">文字語彙・表記</p>
            <h1>2. 表記 (漢字)</h1>
            <p class="sub">Kuis Interaktif 90 Soal. Pilih kanji yang paling tepat dari 1・2・3・4.</p>
          </div>
        </div>
        <div class="stats" aria-label="Statistik kuis" style="margin-top: 18px;">
          <div class="stat"><span>Terjawab</span><strong id="answered">0/90</strong></div>
          <div class="stat"><span>Benar</span><strong id="correct">0</strong></div>
          <div class="stat"><span>Salah</span><strong id="wrong">0</strong></div>
          <div class="stat"><span>Skor</span><strong id="score">0%</strong></div>
        </div>
        <div class="progress" aria-hidden="true"><div id="progress"></div></div>
        <div class="timer-tools">
          <label for="minutesInput">Timer (menit)</label>
          <input class="timer-input" id="minutesInput" type="number" min="1" value="30">
          <button class="btn" id="startTimerBtn" type="button">Mulai timer</button>
          <button class="btn" id="pauseTimerBtn" type="button">Pause</button>
          <button class="btn" id="stopTimerBtn" type="button">Stop</button>
          <button class="btn" id="finishNowBtn" type="button">Selesai sekarang</button>
          <button class="btn" id="autoNextBtn" type="button">Auto Next: OFF</button>
          <strong id="timerDisplay">30:00</strong>
        </div>
      </section>

      <section class="panel">
        <div class="quiz-head">
          <div class="question-no" id="questionNo">Soal 1 / 90</div>
          <div class="quiz-tools">
            <div class="segmented">
              <button class="btn active" id="allMode" type="button">Semua soal</button>
              <button class="btn" id="wrongMode" type="button">Ulangi salah</button>
            </div>
            <button class="btn danger" id="resetBtn" type="button">Reset jawaban</button>
          </div>
        </div>

        <div class="question-text" id="questionText"></div>

        <div class="choices" id="choices"></div>
        <div class="actions" style="margin-top: 20px;">
          <button class="btn" id="prevBtn" type="button">← Sebelumnya</button>
          <div class="action-group">
            <button class="btn" id="reviewBtn" type="button">Review jawaban</button>
            <button class="btn primary" id="nextBtn" type="button">Berikutnya →</button>
          </div>
        </div>
      </section>

      <section class="panel review" id="reviewPanel">
        <h2 id="reviewTitle">Review jawaban</h2>
        <p class="review-intro">Ringkasan dari kunci PDF: jawaban benar dan arti inti kata target untuk soal yang sedang dibuka.</p>
        <div id="reviewList"></div>
      </section>

      <section class="panel">
        <p class="eyebrow">Navigasi soal</p>
        <div class="nav-grid" id="navGrid"></div>
      </section>
    </div>
  </main>

    const state = {
      index: 0,
      answers: {},
      showReview: false,
      mode: "all",
      autoNext: false,
      revealResult: false,
      timerSeconds: 1800,
      timerRunning: false,
      timerHandle: null,
      examMode: false
    };

    const el = {
      answered: document.querySelector("#answered"),
      correct: document.querySelector("#correct"),
      wrong: document.querySelector("#wrong"),
      score: document.querySelector("#score"),
      progress: document.querySelector("#progress"),
      questionNo: document.querySelector("#questionNo"),
      questionText: document.querySelector("#questionText"),
      choices: document.querySelector("#choices"),
      prevBtn: document.querySelector("#prevBtn"),
      nextBtn: document.querySelector("#nextBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      reviewBtn: document.querySelector("#reviewBtn"),
      reviewTitle: document.querySelector("#reviewTitle"),
      reviewPanel: document.querySelector("#reviewPanel"),
      reviewList: document.querySelector("#reviewList"),
      navGrid: document.querySelector("#navGrid"),
      allMode: document.querySelector("#allMode"),
      wrongMode: document.querySelector("#wrongMode"),
      minutesInput: document.querySelector("#minutesInput"),
      startTimerBtn: document.querySelector("#startTimerBtn"),
      pauseTimerBtn: document.querySelector("#pauseTimerBtn"),
      stopTimerBtn: document.querySelector("#stopTimerBtn"),
      finishNowBtn: document.querySelector("#finishNowBtn"),
      autoNextBtn: document.querySelector("#autoNextBtn"),
      timerDisplay: document.querySelector("#timerDisplay")
    };

    function pool() {
      if (state.mode === "wrong") {
        const wrong = questions.filter((q) => state.answers[q.id] !== undefined && state.answers[q.id] !== q.answer);
        return wrong.length ? wrong : questions;
      }
      return questions;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function currentQuestion() {
      const items = pool();
      state.index = Math.min(state.index, items.length - 1);
      return items[state.index];
    }
    function highlightPrompt(q) {
      const prompt = q.prompt && q.prompt.trim() ? q.prompt : ("Soal " + q.id);
      const match = /「([^」]+)」/.exec(q.note || "");
      if (!match) return escapeHtml(prompt);
      const key = match[1];
      let at = prompt.indexOf(key);
      let token = key;
      if (at === -1 && key.length >= 2) {
        token = key.slice(0, -1);
        at = prompt.indexOf(token);
      }
      if (at === -1) return escapeHtml(prompt);
      return escapeHtml(prompt.slice(0, at)) + '<span class="marked">' + escapeHtml(token) + "</span>" + escapeHtml(prompt.slice(at + token.length));
    }

    function stats() {
      const correctCount = questions.filter((q) => state.answers[q.id] === q.answer).length;
      const answeredCount = questions.filter((q) => state.answers[q.id] !== undefined).length;
      const wrongCount = answeredCount - correctCount;
      return {
        correctCount,
        wrongCount,
        answeredCount,
        percentage: answeredCount ? Math.round((correctCount / answeredCount) * 100) : 0
      };
    }
    function formatTimer(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }
    function stopTimer() {
      if (state.timerHandle) clearInterval(state.timerHandle);
      state.timerHandle = null;
      state.timerRunning = false;
    }
    function startTimer() {
      stopTimer();
      const mins = Math.max(1, Number(el.minutesInput.value || 30));
      state.timerSeconds = mins * 60;
      state.revealResult = false;
      state.examMode = true;
      state.timerRunning = true;
      state.timerHandle = setInterval(() => {
        state.timerSeconds = Math.max(0, state.timerSeconds - 1);
        if (state.timerSeconds === 0) {
          stopTimer();
          state.revealResult = true;
        }
        render();
      }, 1000);
      render();
    }
    function finishNow() {
      if (!state.examMode) return;
      stopTimer();
      state.revealResult = true;
      render();
    }

    function render() {
      const items = pool();
      const q = currentQuestion();
      const selected = state.answers[q.id];
      const summary = stats();
      const showLive = !(state.examMode && !state.revealResult);
      const displayCorrect = showLive ? summary.correctCount : 0;
      const displayWrong = showLive ? summary.wrongCount : 0;
      const displayScore = showLive ? summary.percentage + "%" : "-";

      el.answered.textContent = summary.answeredCount + "/90";
      el.correct.textContent = String(displayCorrect);
      el.wrong.textContent = String(displayWrong);
      el.score.textContent = displayScore;
      el.progress.style.width = ((summary.answeredCount / questions.length) * 100) + "%";

      el.questionNo.textContent = "Soal " + q.id + " / 90";
      el.timerDisplay.textContent = formatTimer(state.timerSeconds);
      el.autoNextBtn.textContent = "Auto Next: " + (state.autoNext ? "ON" : "OFF");
      el.questionText.innerHTML = highlightPrompt(q);
      el.allMode.classList.toggle("active", state.mode === "all");
      el.wrongMode.classList.toggle("active", state.mode === "wrong");

      el.choices.innerHTML = "";
      [0, 1, 2, 3].forEach((choiceIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        if (state.revealResult && selected !== undefined && q.answer === choiceIndex) button.classList.add("correct");
        if (state.revealResult && selected !== undefined && selected === choiceIndex && q.answer !== choiceIndex) button.classList.add("wrong");
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = String(choiceIndex + 1);
        const text = document.createElement("span");
        text.className = "choice-text";
        text.textContent = q.options?.[choiceIndex] || String(choiceIndex + 1);
        button.append(badge, text);
        button.addEventListener("click", () => {
          state.answers[q.id] = choiceIndex;
          state.showReview = true;
          if (state.autoNext && state.index < pool().length - 1) state.index += 1;
          render();
        });
        el.choices.append(button);
      });

      el.prevBtn.disabled = state.index === 0;
      el.nextBtn.disabled = state.index === items.length - 1;
      el.reviewBtn.disabled = selected === undefined;
      el.reviewBtn.textContent = state.showReview ? "Tutup review" : "Review jawaban";
      el.reviewPanel.classList.toggle("show", state.showReview);

      renderNav(q.id);
      if (state.showReview) renderReview();
    }

    function renderNav(currentId) {
      el.navGrid.innerHTML = "";
      questions.forEach((q) => {
        const a = state.answers[q.id];
        const button = document.createElement("button");
        button.type = "button";
        button.className = "nav-btn";
        if (q.id === currentId) button.classList.add("current");
        if (a !== undefined && !state.revealResult) button.classList.add("answered");
        if (state.revealResult && a !== undefined) button.classList.add(a === q.answer ? "correct" : "wrong");
        button.textContent = q.id;
        button.addEventListener("click", () => {
          state.mode = "all";
          state.index = q.id - 1;
          render();
        });
        el.navGrid.append(button);
      });
    }

    function renderReview() {
      el.reviewList.innerHTML = "";
      const q = currentQuestion();
      const a = state.answers[q.id];
      if (a === undefined) {
        el.reviewList.innerHTML = '<div class="review-item">Jawab dulu soal ini untuk melihat isi review.</div>';
        return;
      }
      const ok = a === q.answer;
      const item = document.createElement("div");
      item.className = "review-item";
      const userAnswer = a !== undefined
        ? '<span class="' + (ok ? "ok" : "no") + '">・Pilihanmu: ' + (a + 1) + "</span>"
        : '<span>・Pilihanmu: Belum dijawab</span>';
      el.reviewTitle.textContent = "Review soal " + q.id;
      item.innerHTML =
        "<strong>【" + q.id + "】 正解 " + (q.answer + 1) + " ✓</strong>" +
        '<div class="review-note"><strong>Catatan / arti Indonesia</strong>' + escapeHtml(q.note) + "</div>" +
        "<div style=\"margin-top:6px;\">" + highlightPrompt(q) + "</div>" +
        "<div style=\"margin-top:4px;\">Jawaban benar: " + (q.answer + 1) + ". " + escapeHtml(q.options?.[q.answer] || "") + "</div>" +
        "<div style=\"margin-top:4px;\">" + userAnswer + "</div>";
      el.reviewList.append(item);
    }

    el.prevBtn.addEventListener("click", () => {
      state.index = Math.max(0, state.index - 1);
      render();
    });

    el.nextBtn.addEventListener("click", () => {
      state.index = Math.min(pool().length - 1, state.index + 1);
      render();
    });

    el.resetBtn.addEventListener("click", () => {
      if (Object.keys(state.answers).length && !confirm("Reset semua jawaban dari awal?")) return;
      state.index = 0;
      state.answers = {};
      state.showReview = false;
      state.mode = "all";
      state.revealResult = false;
      stopTimer();
      render();
    });

    el.reviewBtn.addEventListener("click", () => {
      const q = currentQuestion();
      if (state.answers[q.id] === undefined) return;
      state.showReview = !state.showReview;
      render();
    });

    el.allMode.addEventListener("click", () => {
      state.mode = "all";
      state.index = 0;
      render();
    });

    el.wrongMode.addEventListener("click", () => {
      state.mode = "wrong";
      state.index = 0;
      render();
    });
    el.autoNextBtn.addEventListener("click", () => {
      state.autoNext = !state.autoNext;
      render();
    });
    el.startTimerBtn.addEventListener("click", startTimer);
    el.pauseTimerBtn.addEventListener("click", () => {
      if (!state.examMode) return;
      if (state.timerRunning) {
        stopTimer();
      } else if (state.timerSeconds > 0 && !state.revealResult) {
        state.timerRunning = true;
        state.timerHandle = setInterval(() => {
          state.timerSeconds = Math.max(0, state.timerSeconds - 1);
          if (state.timerSeconds === 0) {
            stopTimer();
            state.revealResult = true;
          }
          render();
        }, 1000);
      }
      render();
    });
    el.stopTimerBtn.addEventListener("click", () => {
      stopTimer();
      state.examMode = false;
      state.revealResult = false;
      state.timerSeconds = Math.max(1, Number(el.minutesInput.value || 30)) * 60;
      render();
    });
    el.finishNowBtn.addEventListener("click", finishNow);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft" && !el.prevBtn.disabled) {
        event.preventDefault();
        el.prevBtn.click();
      }
      if (event.key === "ArrowRight" && !el.nextBtn.disabled) {
        event.preventDefault();
        el.nextBtn.click();
      }
    });

    async function loadQuestionText() {
      try {
        const response = await fetch("../assets/2-hyouki-kanji/questions-text.json");
        if (!response.ok) throw new Error("Gagal memuat teks soal");
        const textData = await response.json();
        const byId = new Map(textData.map((item) => [item.id, item]));
        questions.forEach((q) => {
          const source = byId.get(q.id);
          if (!source) return;
          q.prompt = source.prompt || "";
          q.options = Array.isArray(source.options) ? source.options.slice(0, 4) : [];
        });
      } catch (error) {
        console.error(error);
      } finally {
        render();
      }
    }

    loadQuestionText();
  </script>
