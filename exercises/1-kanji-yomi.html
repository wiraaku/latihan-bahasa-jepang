<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1. 漢字読み</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e9eef2;
      color: #172033;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #e9eef2; }
    button { font: inherit; }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      width: min(1040px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #ccd6df;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 42, 55, 0.06);
      padding: 24px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: #607086;
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sub {
      margin: 8px 0 0;
      color: #526277;
      font-size: 15px;
    }
    .back {
      color: #172033;
      font-weight: 800;
      text-decoration: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(86px, 1fr));
      gap: 10px;
      min-width: min(470px, 100%);
    }

    .stat {
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 12px;
      text-align: center;
    }

    .stat span {
      display: block;
      color: #65758b;
      font-size: 12px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 24px;
      line-height: 1.2;
    }

    .progress {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #d4dde6;
      margin-top: 22px;
    }

    .progress > div {
      width: 0;
      height: 100%;
      background: #172033;
      transition: width 180ms ease;
    }

    .quiz-head, .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .question-no {
      color: #607086;
      font-size: 14px;
      font-weight: 800;
    }

    .segmented, .action-group, .quiz-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .timer-tools {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .timer-input {
      width: 92px;
      min-height: 42px;
      border: 1px solid #c7d2dc;
      border-radius: 8px;
      padding: 0 10px;
    }
    #timerDisplay {
      font-size: clamp(24px, 3.2vw, 34px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      min-width: 110px;
      text-align: right;
    }

    .quiz-tools {
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid #c7d2dc;
      border-radius: 8px;
      background: #ffffff;
      color: #172033;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .btn:hover:not(:disabled) {
      border-color: #172033;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn.primary, .btn.active {
      background: #172033;
      border-color: #172033;
      color: #ffffff;
    }

    .btn.danger {
      background: #fff7f8;
      border-color: #e1abb5;
      color: #a32238;
    }

    .btn.danger:hover:not(:disabled) {
      border-color: #a32238;
    }

    .sentence {
      margin: 22px 0;
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 22px;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.85;
      overflow-wrap: anywhere;
    }

    .marked {
      color: #07111f;
      font-weight: 800;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 72px;
      border: 2px solid #c8d2dc;
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      text-align: left;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease;
    }

    .choice:hover { border-color: #172033; }

    .badge {
      display: inline-grid;
      place-items: center;
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #e9eef2;
      font-weight: 800;
    }

    .choice-text {
      font-size: clamp(19px, 2.4vw, 24px);
      font-weight: 400;
      overflow-wrap: anywhere;
    }

    .choice.correct {
      background: #edf9f1;
      border-color: #24935d;
    }

    .choice.wrong {
      background: #fff0f2;
      border-color: #d53b57;
    }


    .nav-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(44px, 1fr));
      gap: 8px;
    }

    .nav-btn {
      border: 1px solid #ccd6df;
      border-radius: 8px;
      background: #f3f6f8;
      min-height: 40px;
      font-weight: 800;
      cursor: pointer;
    }

    .nav-btn.current { outline: 2px solid #172033; outline-offset: 1px; }
    .nav-btn.answered { background: #e3efff; border-color: #7aa8e8; }
    .nav-btn.correct { background: #dff4e7; border-color: #78c596; }
    .nav-btn.wrong { background: #ffe2e7; border-color: #e77c8e; }

    .review { display: none; }
    .review.show { display: block; }
    .review h2 { margin: 0 0 8px; font-size: 22px; }

    .review-intro {
      margin: 0 0 16px;
      color: #526277;
      font-size: 14px;
      line-height: 1.5;
    }

    .review-list {
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 13px;
      line-height: 1.55;
    }

    .review-item strong { display: block; margin-bottom: 4px; }

    .review-note {
      margin-top: 5px;
      color: #526277;
      font-size: 14px;
    }

    .ok { color: #137346; font-weight: 800; }
    .no { color: #ba2440; font-weight: 800; }

    @media (max-width: 760px) {
      .page { padding: 14px; }
      .panel { padding: 18px; }
      .top { align-items: stretch; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, 1fr); min-width: 0; }
      .quiz-tools { width: 100%; justify-content: stretch; }
      .segmented { flex: 1 1 auto; }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .actions { align-items: stretch; flex-wrap: nowrap; }
      .actions > .btn, .action-group { width: 100%; }
      .action-group .btn { flex: 1 1 130px; }
      .nav-grid { grid-template-columns: repeat(5, minmax(44px, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="panel">
        <a class="back" href="../index.html">← Menu utama</a>
        <div class="top" style="margin-top: 12px;">
          <div>
            <p class="eyebrow">文字語彙・漢字読み</p>
            <h1>1. 漢字読み</h1>
            <p class="sub">Kuis Interaktif 80 Soal. Pilih cara baca yang paling tepat dari 1・2・3・4.</p>
          </div>
          <div class="stats" aria-label="Statistik kuis">
            <div class="stat"><span>Terjawab</span><strong id="answered">0/80</strong></div>
            <div class="stat"><span>Benar</span><strong id="correct">0</strong></div>
            <div class="stat"><span>Salah</span><strong id="wrong">0</strong></div>
            <div class="stat"><span>Skor</span><strong id="score">0%</strong></div>
          </div>
        </div>
        <div class="progress" aria-hidden="true"><div id="progress"></div></div>
        <div class="timer-tools">
          <label for="minutesInput">Timer (menit)</label>
          <input class="timer-input" id="minutesInput" type="number" min="1" value="30">
          <button class="btn" id="startTimerBtn" type="button">Mulai timer</button>
          <button class="btn" id="pauseTimerBtn" type="button">Pause</button>
          <button class="btn" id="stopTimerBtn" type="button">Stop</button>
          <button class="btn" id="finishNowBtn" type="button">Selesai sekarang</button>
          <button class="btn" id="autoNextBtn" type="button">Auto Next: OFF</button>
          <strong id="timerDisplay">30:00</strong>
        </div>
      </section>

      <section class="panel">
        <div class="quiz-head">
          <div class="question-no" id="questionNo">Soal 1 / 80</div>
          <div class="quiz-tools">
            <div class="segmented">
              <button class="btn active" id="allMode" type="button">Semua soal</button>
              <button class="btn" id="wrongMode" type="button">Ulangi salah</button>
            </div>
            <button class="btn danger" id="resetBtn" type="button">Reset jawaban</button>
          </div>
        </div>

        <div class="sentence" id="sentence"></div>
        <div class="choices" id="choices"></div>
        <div class="actions" style="margin-top: 20px;">
          <button class="btn" id="prevBtn" type="button">← Sebelumnya</button>
          <div class="action-group">
            <button class="btn" id="reviewBtn" type="button">Review jawaban</button>
            <button class="btn primary" id="nextBtn" type="button">Berikutnya →</button>
          </div>
        </div>
      </section>

      <section class="panel review" id="reviewPanel">
        <h2 id="reviewTitle">Review jawaban</h2>
        <p class="review-intro">Ringkasan dari kunci PDF: bacaan benar dan arti inti kata target untuk soal yang sedang dibuka.</p>
        <div class="review-list" id="reviewList"></div>
      </section>

      <section class="panel">
        <p class="eyebrow">Navigasi soal</p>
        <div class="nav-grid" id="navGrid"></div>
      </section>
    </div>
  </main>

  <script>

      pauseTimerBtn: document.querySelector("#pauseTimerBtn"),
      stopTimerBtn: document.querySelector("#stopTimerBtn"),
      finishNowBtn: document.querySelector("#finishNowBtn"),
      autoNextBtn: document.querySelector("#autoNextBtn"),
      timerDisplay: document.querySelector("#timerDisplay")
    };

    function pool() {
      if (state.mode === "wrong") {
        const wrong = questions.filter((q) => state.answers[q.id] !== undefined && state.answers[q.id] !== q.answer);
        return wrong.length ? wrong : questions;
      }
      return questions;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function markedSentence(sentence, target) {
      const safeSentence = escapeHtml(sentence);
      const safeTarget = escapeHtml(target);
      const index = safeSentence.indexOf(safeTarget);
      if (index === -1) return safeSentence;
      return safeSentence.slice(0, index) + '<span class="marked">' + safeTarget + '</span>' + safeSentence.slice(index + safeTarget.length);
    }

    function currentQuestion() {
      const items = pool();
      state.index = Math.min(state.index, items.length - 1);
      return items[state.index];
    }

    function stats() {
      const correctCount = questions.filter((q) => state.answers[q.id] === q.answer).length;
      const answeredCount = questions.filter((q) => state.answers[q.id] !== undefined).length;
      const wrongCount = answeredCount - correctCount;
      return {
        correctCount,
        wrongCount,
        answeredCount,
        percentage: answeredCount ? Math.round((correctCount / answeredCount) * 100) : 0
      };
    }
    function formatTimer(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }
    function stopTimer() {
      if (state.timerHandle) clearInterval(state.timerHandle);
      state.timerHandle = null;
      state.timerRunning = false;
    }
    function startTimer() {
      stopTimer();
      const mins = Math.max(1, Number(el.minutesInput.value || 30));
      state.timerSeconds = mins * 60;
      state.revealResult = false;
      state.examMode = true;
      state.timerRunning = true;
      state.timerHandle = setInterval(() => {
        state.timerSeconds = Math.max(0, state.timerSeconds - 1);
        if (state.timerSeconds === 0) {
          stopTimer();
          state.revealResult = true;
        }
        render();
      }, 1000);
      render();
    }
    function finishNow() {
      if (!state.examMode) return;
      stopTimer();
      state.revealResult = true;
      render();
    }

    function render() {
      const items = pool();
      const q = currentQuestion();
      const selected = state.answers[q.id];
      const summary = stats();
      const showLive = !(state.examMode && !state.revealResult);

      el.answered.textContent = summary.answeredCount + "/80";
      el.correct.textContent = showLive ? String(summary.correctCount) : "0";
      el.wrong.textContent = showLive ? String(summary.wrongCount) : "0";
      el.score.textContent = showLive ? (summary.percentage + "%") : "-";
      el.progress.style.width = ((summary.answeredCount / questions.length) * 100) + "%";

      el.questionNo.textContent = "Soal " + q.id + " / 80";
      el.timerDisplay.textContent = formatTimer(state.timerSeconds);
      el.autoNextBtn.textContent = "Auto Next: " + (state.autoNext ? "ON" : "OFF");
      el.sentence.innerHTML = markedSentence(q.sentence, q.target);
      el.allMode.classList.toggle("active", state.mode === "all");
      el.wrongMode.classList.toggle("active", state.mode === "wrong");

      el.choices.innerHTML = "";
      q.choices.forEach((choice, i) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        if (state.revealResult && selected !== undefined && q.answer === i) button.classList.add("correct");
        if (state.revealResult && selected !== undefined && selected === i && q.answer !== i) button.classList.add("wrong");
        button.innerHTML = '<span class="badge">' + (i + 1) + '</span><span class="choice-text">' + escapeHtml(choice) + '</span>';
        button.addEventListener("click", () => {
          state.answers[q.id] = i;
          state.showReview = true;
          if (state.autoNext && state.index < pool().length - 1) state.index += 1;
          render();
        });
        el.choices.append(button);
      });

      el.prevBtn.disabled = state.index === 0;
      el.nextBtn.disabled = state.index === items.length - 1;
      el.reviewBtn.disabled = selected === undefined;
      el.reviewBtn.textContent = state.showReview ? "Tutup review" : "Review jawaban";
      el.reviewPanel.classList.toggle("show", state.showReview);

      renderNav(q.id);
      if (state.showReview) renderReview();
    }

    function renderNav(currentId) {
      el.navGrid.innerHTML = "";
      questions.forEach((q) => {
        const a = state.answers[q.id];
        const button = document.createElement("button");
        button.type = "button";
        button.className = "nav-btn";
        if (q.id === currentId) button.classList.add("current");
        if (a !== undefined && !state.revealResult) button.classList.add("answered");
        if (state.revealResult && a !== undefined) button.classList.add(a === q.answer ? "correct" : "wrong");
        button.textContent = q.id;
        button.addEventListener("click", () => {
          state.mode = "all";
          state.index = q.id - 1;
          render();
        });
        el.navGrid.append(button);
      });
    }

    function renderReview() {
      el.reviewList.innerHTML = "";
      const q = currentQuestion();
      const a = state.answers[q.id];
      if (a === undefined) {
        el.reviewList.innerHTML = '<div class="review-item">Jawab dulu soal ini untuk melihat isi review.</div>';
        return;
      }
      const ok = a === q.answer;
      const item = document.createElement("div");
      item.className = "review-item";
      const userAnswer = a !== undefined
        ? '<span class="' + (ok ? "ok" : "no") + '">・Pilihanmu: ' + (a + 1) + ". " + escapeHtml(q.choices[a]) + "</span>"
        : '<span>・Pilihanmu: Belum dijawab</span>';
      const raw = String(reviewNotes[q.id] || "");
      const keyMatch = raw.match(/「([^」]+)」/);
      const keyText = keyMatch ? keyMatch[1] : q.choices[q.answer];
      const cleanSentence = q.sentence.replace(/[。．]$/, "");
      const noteLines = [
        q.target + "「" + keyText + "」",
        "Bacaan yang benar untuk kalimat ini: " + (q.answer + 1) + ". " + q.choices[q.answer]
      ];
      const note = '<div class="review-note">' + noteLines.map((line) => escapeHtml(line)).join("<br>") + "</div>";
      el.reviewTitle.textContent = "Review soal " + q.id;
      item.innerHTML =
        "<strong>【" + q.id + "】 正解 " + (q.answer + 1) + " ✓</strong>" +
        note +
        "<div style=\"margin-top:6px;\">" + markedSentence(cleanSentence + "。", q.target) + "</div>" +
        "<div style=\"margin-top:4px;\">Jawaban benar: " + (q.answer + 1) + ". " + escapeHtml(q.choices[q.answer]) + "</div>" +
        "<div style=\"margin-top:4px;\">" + userAnswer + "</div>";
      el.reviewList.append(item);
    }

    el.prevBtn.addEventListener("click", () => {
      state.index = Math.max(0, state.index - 1);
      render();
    });

    el.nextBtn.addEventListener("click", () => {
      state.index = Math.min(pool().length - 1, state.index + 1);
      render();
    });

    el.resetBtn.addEventListener("click", () => {
      if (Object.keys(state.answers).length && !confirm("Reset semua jawaban dari awal?")) return;
      state.index = 0;
      state.answers = {};
      state.showReview = false;
      state.mode = "all";
      state.revealResult = false;
      stopTimer();
      render();
    });

    el.reviewBtn.addEventListener("click", () => {
      const q = currentQuestion();
      if (state.answers[q.id] === undefined) return;
      state.showReview = !state.showReview;
      render();
    });

    el.allMode.addEventListener("click", () => {
      state.mode = "all";
      state.index = 0;
      render();
    });

    el.wrongMode.addEventListener("click", () => {
      state.mode = "wrong";
      state.index = 0;
      render();
    });
    el.autoNextBtn.addEventListener("click", () => {
      state.autoNext = !state.autoNext;
      render();
    });
    el.startTimerBtn.addEventListener("click", startTimer);
    el.pauseTimerBtn.addEventListener("click", () => {
      if (!state.examMode) return;
      if (state.timerRunning) {
        stopTimer();
      } else if (state.timerSeconds > 0 && !state.revealResult) {
        state.timerRunning = true;
        state.timerHandle = setInterval(() => {
          state.timerSeconds = Math.max(0, state.timerSeconds - 1);
          if (state.timerSeconds === 0) {
            stopTimer();
            state.revealResult = true;
          }
          render();
        }, 1000);
      }
      render();
    });
    el.stopTimerBtn.addEventListener("click", () => {
      stopTimer();
      state.examMode = false;
      state.revealResult = false;
      state.timerSeconds = Math.max(1, Number(el.minutesInput.value || 30)) * 60;
      render();
    });
    el.finishNowBtn.addEventListener("click", finishNow);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft" && !el.prevBtn.disabled) {
        event.preventDefault();
        el.prevBtn.click();
      }
      if (event.key === "ArrowRight" && !el.nextBtn.disabled) {
        event.preventDefault();
        el.nextBtn.click();
      }
    });

    render();
  </script>
</body>
</html>
