<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>5. 用法</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e9eef2;
      color: #172033;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #e9eef2; }
    button { font: inherit; }

    .page { min-height: 100vh; padding: 24px; }
    .wrap { width: min(1040px, 100%); margin: 0 auto; display: grid; gap: 18px; }
    .panel {
      background: #ffffff;
      border: 1px solid #ccd6df;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 42, 55, 0.06);
      padding: 24px;
    }

    .top, .quiz-head, .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: nowrap;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: #607086;
      font-size: 14px;
      font-weight: 800;
    }

    h1 { margin: 0; font-size: clamp(26px, 3vw, 36px); line-height: 1.1; letter-spacing: 0; }
    .sub { margin: 8px 0 0; color: #526277; font-size: 15px; line-height: 1.5; }
    .back { color: #172033; font-weight: 800; text-decoration: none; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(86px, 1fr));
      gap: 10px;
      min-width: min(470px, 100%);
    }

    .stat {
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 12px;
      text-align: center;
    }

    .stat span { display: block; color: #65758b; font-size: 12px; font-weight: 800; }
    .stat strong { display: block; margin-top: 2px; font-size: 24px; line-height: 1.2; }

    .progress {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #d4dde6;
      margin-top: 22px;
    }

    .progress > div {
      width: 0;
      height: 100%;
      background: #172033;
      transition: width 180ms ease;
    }

    .question-no { color: #607086; font-size: 14px; font-weight: 800; }
    .segmented, .action-group, .quiz-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .quiz-tools { justify-content: flex-end; }
    .timer-tools { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
    .timer-input { width: 92px; min-height: 42px; border: 1px solid #c7d2dc; border-radius: 8px; padding: 0 10px; }
    #timerDisplay {
      font-size: clamp(24px, 3.2vw, 34px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      min-width: 110px;
      text-align: right;
    }

    .btn {
      border: 1px solid #c7d2dc;
      border-radius: 8px;
      background: #ffffff;
      color: #172033;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .btn:hover:not(:disabled) { border-color: #172033; transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.primary, .btn.active { background: #172033; border-color: #172033; color: #ffffff; }
    .btn.danger { background: #fff7f8; border-color: #e1abb5; color: #a32238; }
    .btn.danger:hover:not(:disabled) { border-color: #a32238; }

    .question-card {
      margin: 22px 0;
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 18px;
    }

    .term-label {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
      font-weight: 800;
    }

    .term-sub {
      margin: 8px 0 0;
      color: #526277;
      font-size: 14px;
      line-height: 1.5;
    }

    .marked {
      font-weight: 800;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 5px;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .choice {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-height: 74px;
      border: 2px solid #c8d2dc;
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease;
      text-align: left;
    }

    .badge {
      display: inline-grid;
      place-items: center;
      flex: 0 0 32px;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: #e9eef2;
      font-size: 14px;
      font-weight: 800;
    }

    .choice-text {
      flex: 1 1 auto;
      font-size: 21px;
      line-height: 1.8;
      font-weight: 500;
    }

    .choice:hover { border-color: #172033; }
    .choice.correct { background: #edf9f1; border-color: #24935d; }
    .choice.wrong { background: #fff0f2; border-color: #d53b57; }

    .review { display: none; }
    .review.show { display: block; }
    .review h2 { margin: 0 0 8px; font-size: 22px; }
    .review-intro { margin: 0 0 16px; color: #526277; font-size: 14px; line-height: 1.5; }
    .review-item {
      border: 1px solid #d9e1e8;
      border-radius: 8px;
      background: #f7f9fb;
      padding: 14px;
      line-height: 1.65;
    }
    .review-note { margin-top: 8px; color: #526277; font-size: 14px; white-space: pre-line; }
    .ok { color: #137346; font-weight: 800; }
    .no { color: #ba2440; font-weight: 800; }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(44px, 1fr));
      gap: 8px;
    }

    .nav-btn {
      border: 1px solid #ccd6df;
      border-radius: 8px;
      background: #f3f6f8;
      min-height: 40px;
      font-weight: 800;
      cursor: pointer;
    }

    .nav-btn.current { outline: 2px solid #172033; outline-offset: 1px; }
    .nav-btn.answered { background: #e3efff; border-color: #7aa8e8; }
    .nav-btn.correct { background: #dff4e7; border-color: #78c596; }
    .nav-btn.wrong { background: #ffe2e7; border-color: #e77c8e; }

    @media (max-width: 760px) {
      .page { padding: 14px; }
      .panel { padding: 18px; }
      .top { align-items: stretch; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, 1fr); min-width: 0; }
      .quiz-tools { width: 100%; justify-content: stretch; }
      .segmented { flex: 1 1 auto; }
      .actions { align-items: stretch; flex-wrap: nowrap; }
      .actions > .btn, .action-group { width: 100%; }
      .action-group .btn { flex: 1 1 130px; }
      .nav-grid { grid-template-columns: repeat(5, minmax(44px, 1fr)); }
      .choice-text { font-size: 18px; line-height: 1.7; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="panel">
        <a class="back" href="../index.html">← Menu utama</a>
        <div class="top" style="margin-top: 12px;">
          <div>
            <p class="eyebrow">文字語彙・用法</p>
            <h1>5. 用法</h1>
            <p class="sub">Kuis Interaktif 用法. Pilih kalimat yang memakai kata dengan penggunaan paling tepat.</p>
          </div>
        </div>
        <div class="stats" aria-label="Statistik kuis" style="margin-top: 18px;">
          <div class="stat"><span>Terjawab</span><strong id="answered">0/0</strong></div>
          <div class="stat"><span>Benar</span><strong id="correct">0</strong></div>
          <div class="stat"><span>Salah</span><strong id="wrong">0</strong></div>
          <div class="stat"><span>Skor</span><strong id="score">0%</strong></div>
        </div>
        <div class="progress" aria-hidden="true"><div id="progress"></div></div>
        <div class="timer-tools">
          <label for="minutesInput">Timer (menit)</label>
          <input class="timer-input" id="minutesInput" type="number" min="1" value="20">
          <button class="btn" id="startTimerBtn" type="button">Mulai timer</button>
          <button class="btn" id="pauseTimerBtn" type="button">Pause</button>
          <button class="btn" id="stopTimerBtn" type="button">Stop</button>
          <button class="btn" id="finishNowBtn" type="button">Selesai sekarang</button>
          <button class="btn" id="autoNextBtn" type="button">Auto Next: OFF</button>
          <strong id="timerDisplay">20:00</strong>
        </div>
      </section>

      <section class="panel">
        <div class="quiz-head">
          <div class="question-no" id="questionNo">Soal 1 / 0</div>
          <div class="quiz-tools">
            <div class="segmented">
              <button class="btn active" id="allMode" type="button">Semua soal</button>
              <button class="btn" id="wrongMode" type="button">Ulangi salah</button>
            </div>
            <button class="btn danger" id="resetBtn" type="button">Reset jawaban</button>
          </div>
        </div>

        <div class="question-card" id="questionText"></div>

        <div class="choices" id="choices"></div>
        <div class="actions" style="margin-top: 20px;">
          <button class="btn" id="prevBtn" type="button">← Sebelumnya</button>
          <div class="action-group">
            <button class="btn" id="reviewBtn" type="button">Review jawaban</button>
            <button class="btn primary" id="nextBtn" type="button">Berikutnya →</button>
          </div>
        </div>
      </section>

      <section class="panel review" id="reviewPanel">
        <h2 id="reviewTitle">Review jawaban</h2>
        <p class="review-intro">Ringkasan singkat dari kunci PDF untuk soal yang sedang dibuka.</p>
        <div id="reviewList"></div>
      </section>

      <section class="panel">
        <p class="eyebrow">Navigasi soal</p>
        <div class="nav-grid" id="navGrid"></div>
      </section>
    </div>
  </main>

  <script>
    const questions = [
      { id: 1, term: "枯れる", options: ["今日は天気がよくて、洗濯物がよく枯れた。", "雨がぜんぜん降らないので、畑の野菜が枯れてしまった。", "パーティーでもらった風船は、すぐに枯れてしまった。", "最近急に枯れた祖父の健康が心配だ。"], answer: 1, note: "「枯れる」 = layu / mati (tanaman).\nBenar karena dipakai saat sayuran di ladang menjadi layu karena tidak turun hujan." },
      { id: 2, term: "期限", options: ["この銀行の機械で1回に引き出せるお金の期限は50万円です。", "新幹線は期限通りに東京駅に着いた。", "雨が降り続く期限を「梅雨」という。", "入学金の支払いの期限が近づいている。"], answer: 3, note: "「期限」 = batas waktu / tenggat.\nBenar karena dipakai untuk waktu terakhir pembayaran atau penyelesaian." },
      { id: 3, term: "うんと", options: ["毎日うんと12時に教会の鐘が鳴る。", "もう授業が始まっていたのでうんと教室に入った。", "あの木はうんと倒れそうだ。危ない。", "さあ、遠慮しないでうんと食べてね。"], answer: 3, note: "「うんと」 = sangat / banyak.\nBenar karena dipakai untuk mendorong seseorang makan banyak." },
      { id: 4, term: "レジャー", options: ["冬のレジャーといえば、やっぱりスキーですね。", "お湯をレジャーに入れておけば、冷めませんよ。", "店に入って、レジャーを見ながら何を注文しようかと考えるのは楽しい。", "店のレジでもらったレジャーは捨てないでとっておこう。"], answer: 0, note: "「レジャー」 = rekreasi / waktu luang.\nBenar karena dipakai untuk kegiatan santai seperti ski." },
      { id: 5, term: "もったいない", options: ["え？それ、捨てるの？まだ使えるのに、もったいない。", "電車が遅れたんですか。それなら、遅刻したのも、もったいないですね。", "駅前に宇宙人がいた？そんなことはもったいないよ。", "もったいないのですが、お借りした本をなくしてしまったんです。"], answer: 0, note: "「もったいない」 = sayang sekali / mubazir.\nBenar karena dipakai saat barang masih bisa dipakai tetapi mau dibuang." },
      { id: 6, term: "多少", options: ["そんな失礼なことは多少言ってはいけない。", "席は多少あるから、急いで行かなくても座れる。", "まちがいが多少あるが、これはなかなか上手な作文だ。", "大学に行くためには、かなり多少お金が必要だ。"], answer: 1, note: "「多少」 = beberapa / sedikit.\nBenar karena dipakai untuk menyatakan jumlah yang ada meski tidak banyak." },
      { id: 7, term: "居眠り", options: ["講義を聞きながら居眠りをしてしまった。", "私の居眠り時間は6時間ぐらいだ。", "今朝、目覚まし時計が鳴らなくて居眠りをしてしまった。", "試験のために朝まで居眠りをして準備した。"], answer: 0, note: "「居眠り」 = tertidur sejenak.\nBenar karena dipakai saat tertidur sambil mendengarkan kuliah." },
      { id: 8, term: "傾く", options: ["車が通ります。もう少し道路の右に傾いて歩いてください。", "食事の栄養バランスが傾かないように注意しましょう。", "この坂を傾いたところに学校があります。", "地震で家が傾いてしまった。"], answer: 3, note: "「傾く」 = miring / condong.\nBenar karena dipakai untuk bangunan atau benda yang menjadi miring." },
      { id: 9, term: "おしまい", options: ["レポートのおしまいは今週の金曜日です。", "今日の作業はそろそろおしまいにしよう。", "今月のおしまいごろ、アメリカの有名な女優が日本に来るらしい。", "この電車のおしまいは、山本駅です。"], answer: 1, note: "「おしまい」 = selesai / berakhir.\nBenar karena dipakai saat menghentikan pekerjaan atau kegiatan." },
      { id: 10, term: "きつい", options: ["遅刻したことがない人が遅れて来るなんて、きついことだ。", "人が大切にしているものをほしがるなんて、彼はきつい人だ。", "え？ 合格したの？ それはきついね。", "楽な仕事ならいいですが、きつい仕事はいやです。"], answer: 3, note: "「きつい」 = berat / melelahkan.\nBenar karena dipakai untuk pekerjaan yang keras dan tidak ringan." },
      { id: 11, term: "豊富", options: ["この問題はとても豊富で、なかなか解けない。", "このカメラは軽くて丈夫なので、人気が豊富だ。", "私はスポーツが豊富です。たいていのスポーツに自信があります。", "あの人は知識が豊富で、いろいろなことをよく知っている。"], answer: 3, note: "「豊富」 = berlimpah / kaya akan.\nBenar karena dipakai untuk pengetahuan yang banyak." },
      { id: 12, term: "ながめ", options: ["最近ながめが悪くなって、めがねが必要になった。", "よし子は足が長くて、ながめがいい。", "このりんごはながめは悪いが、味はとてもいい。", "どこかながめのいいところで写真を撮りましょう。"], answer: 3, note: "「ながめ」 = pemandangan.\nBenar karena dipakai untuk tempat dengan pemandangan bagus." },
      { id: 13, term: "感心する", options: ["失敗したことをいつまでも感心して悩むのはよくない。", "そのピアニストのすばらしい演奏に観客は感心して涙を流した。", "この学校の生徒のマナーの良さには感心する。", "最近うちの娘は環境問題に感心するようになった。"], answer: 2, note: "「感心する」 = kagum / mengapresiasi.\nBenar karena dipakai saat kagum pada sikap atau hal yang baik." },
      { id: 14, term: "ずつ", options: ["このみかん、一人2個ずつ食べていいよ。", "1日4回、6時間ずつ薬を飲む。", "夏休み、家族が旅行に行ってしまったので、私は一人ずつで過ごした。", "彼は日曜日ずつ野球を見に出かける。"], answer: 0, note: "「ずつ」 = masing-masing / setiap sekian.\nBenar karena dipakai membagi jumlah per orang." },
      { id: 15, term: "めざす", options: ["この会社では、長い期間働ける社員をめざしている。", "彼は大学合格をめざして勉強している。", "どっちにしようかずいぶんめざして、こっちを買うことにした。", "ピアノをめざしているんでしょう？ 上手になりましたか。"], answer: 1, note: "「めざす」 = menargetkan / bercita-cita mencapai.\nBenar karena dipakai untuk lulus universitas." },
      { id: 16, term: "思いつく", options: ["用事を思いついたので、すみませんが帰ります。", "新しい商品の良いアイデアを思いついた。", "試験は来週だと思いついていたが、今週だった。", "駅で思いつかない人に会って、びっくりした。"], answer: 1, note: "「思いつく」 = terpikir / mendapat ide.\nBenar karena dipakai untuk ide baru yang muncul di kepala." },
      { id: 17, term: "留守", options: ["兄はアメリカの大学への留守を希望している。", "友人の結婚式への留守を受けた。", "週末、両親は旅行に行ったが、私は家で留守をしていた。", "友人の家を訪ねたが、留守だった。"], answer: 3, note: "「留守」 = tidak ada di rumah / sedang pergi.\nBenar karena dipakai saat mengunjungi rumah orang tetapi kosong." },
      { id: 18, term: "ラッシュアワー", options: ["来月は3日間のラッシュアワーがあるので、旅行に行こうか。", "ラッシュアワーには、会社で弁当を食べる人が多い。", "ラッシュアワーなので、電車がこんでいる。", "ホテルのラッシュアワーは午後3時からですから、もう入れます。"], answer: 2, note: "「ラッシュアワー」 = jam sibuk.\nBenar karena dipakai saat kereta sangat ramai." },
      { id: 19, term: "きびしい", options: ["私の父はきびしい人で、姉も私も怒られてばかりいる。", "風邪をひいて、きびしいせきが出る。", "この町は電車もバスも1時間に1本しかなくて、生活にきびしい。", "入学したばかりで、まだ友だちがいないので、ちょっときびしい。"], answer: 0, note: "「きびしい」 = tegas / keras.\nBenar karena dipakai untuk sifat orang tua yang disiplin." },
      { id: 20, term: "たえず", options: ["地震が起きたらたえず火を消しなさい。", "牛や羊はたえず草を食べています。", "おなかがすいていたので、二人分の料理をたえず食べてしまった。", "80歳になる祖母は以前とたえず元気だ。"], answer: 1, note: "「たえず」 = terus-menerus / tanpa henti.\nBenar karena dipakai untuk hewan yang terus makan rumput." },
      { id: 21, term: "面倒", options: ["この小説は登場人物が多いし、ストーリーが面倒でわかりにくい。", "面倒だが、祖母の病気は治らないと医者に言われた。", "このクラブに入る手続きは非常に面倒だ。", "道の真ん中においてあるあの自転車、面倒だから、どけよう。"], answer: 2, note: "「面倒」 = merepotkan / ribet.\nBenar karena dipakai untuk prosedur masuk klub yang rumit." },
      { id: 22, term: "ほぼ", options: ["8時に家を出れば、ほぼ間に合うでしょう。", "ケーキを6個もらった。ほぼ6人いたので、1個ずつ食べた。", "今度の試験、ほぼ70点は取りたいけど、取れるかなあ。", "スピーチの原稿はほぼ完成した。あとは題を決めるだけだ。"], answer: 3, note: "「ほぼ」 = hampir / nyaris.\nBenar karena dipakai untuk sesuatu yang hampir selesai." },
      { id: 23, term: "リードする", options: ["商品の売り上げの額では、A社が他社をリードしている。", "犬をリードして散歩に出かけた。", "この電車は、途中の駅で後から来た急行電車にリードされる。", "夫は忙しくて家事をリードしてくれない。"], answer: 0, note: "「リードする」 = memimpin / unggul.\nBenar karena dipakai saat A社 unggul dalam penjualan." },
      { id: 24, term: "道順", options: ["道順に並んでお待ちください。", "今日、学校から帰る道順に友だちに会った。", "駅からホテルまでの道順は、この地図をごらんください。", "このケーキはどういう道順で作るのですか。"], answer: 2, note: "「道順」 = arah / rute jalan.\nBenar karena dipakai menjelaskan jalan dari stasiun ke hotel." },
      { id: 25, term: "気になる", options: ["父は、私がプレゼントしたセーターが気になってくれたようだ。", "ゆうべ、となりの部屋の話し声が気になって眠れなかった。", "あの二人は仲がいい。とても気になるらしい。", "A「何か飲み物はいかがですか。」 B「あ、どうぞ気にならないでください。」"], answer: 1, note: "「気になる」 = mengganggu pikiran / membuat penasaran.\nBenar karena dipakai saat suara tetangga membuat tidak bisa tidur." },
      { id: 26, term: "講演", options: ["店の人に商品について講演をしてもらった。", "はじめて会う人にはこちらから講演をしたほうがいい。", "新発見をしたA教授の講演に世界中が注目している。", "彼女は女優になるために毎日歌とダンスの講演をしている。"], answer: 2, note: "「講演」 = ceramah / kuliah umum.\nBenar karena dipakai untuk ceramah profesor tentang penemuan baru." },
      { id: 27, term: "わざと", options: ["子どもとゲームをするときは、わざと負けてやることが多い。", "雨の中をわざと荷物を届けてくれて、ありがとう。", "新しい住宅地には池や林がわざと作られている。", "お忙しいでしょうが、わざと来てください。"], answer: 0, note: "「わざと」 = sengaja.\nBenar karena dipakai saat sengaja mengalah ketika bermain dengan anak." },
      { id: 28, term: "見事な", options: ["台風が近づいていて、見事な雨が降っている。", "彼の見事なスピーチは人々を感動させた。", "あなたはまだ小さいのにお母さんのお手伝いをして、見事だね。", "会社の面接試験に赤いシャツなど見事な服を着て行ってはいけません。"], answer: 1, note: "「見事な」 = hebat / luar biasa.\nBenar karena dipakai untuk pidato yang sangat bagus." },
      { id: 29, term: "きっかけ", options: ["この先で起こった事故がきっかけで、ここは今通ることができません。", "この英会話教室は授業のきっかけに、まず発音練習をする。", "子どもができたのをきっかけに、たばこをやめることにした。", "昨日授業を欠席したきっかけを話してください。"], answer: 2, note: "「きっかけ」 = pemicu / titik awal.\nBenar karena punya anak menjadi alasan untuk berhenti merokok." },
      { id: 30, term: "出会う", options: ["私はオリンピックに出会うことを目標にがんばっている。", "私が彼と出会ったのは、高校生のときだった。", "入院した先生を出会うために、病院へ行った。", "6時に駅の前で出会う約束をした。"], answer: 1, note: "「出会う」 = bertemu.\nBenar karena dipakai untuk menceritakan kapan pertama kali bertemu seseorang." },
      { id: 31, term: "すっかり", options: ["中学生になったら、すっかり勉強しなきゃだめだよ。", "めがねをかけないと、そこにある物もすっかりして、よく見えない。", "友だちと話しているうちに、外はすっかり暗くなっていた。", "食べ物も飲み物もすっかりありますから、どんどんめしあがってください。"], answer: 2, note: "「すっかり」 = sepenuhnya / benar-benar.\nBenar karena dipakai saat suasana luar sudah benar-benar gelap." },
      { id: 32, term: "お嬢さん", options: ["今度お嬢さんがご結婚なさるそうですね。おめでとうございます。", "私のお嬢さんは妻に似て目が大きい。", "このクラスはお嬢さん学生より男子学生のほうが多い。", "娘はデパートのお嬢さん服売り場で働いている。"], answer: 0, note: "「お嬢さん」 = putri Anda / anak perempuan orang lain secara sopan.\nBenar karena dipakai dengan sopan kepada lawan bicara." },
      { id: 33, term: "渋滞する", options: ["朝の通勤ラッシュの時間は駅が渋滞して、歩くのも大変だ。", "大雨で川の水が渋滞してしまった。", "駅の前には客を待つタクシーが渋滞している。", "連休の間は高速道路が渋滞する。"], answer: 3, note: "「渋滞する」 = macet.\nBenar karena dipakai untuk jalan tol yang macet saat liburan." },
      { id: 34, term: "無事", options: ["この辺は無事なので、女性が夜一人で歩いていても大丈夫だ。", "戦争がなくなって、無事な世界になってほしい。", "毎日運動したり食事に気をつけたりしているので、祖父はとても無事だ。", "一人で旅行していた妹が無事に帰ってきた。"], answer: 3, note: "「無事」 = selamat / baik-baik saja.\nBenar karena dipakai saat seseorang pulang dengan selamat." },
      { id: 35, term: "ぬる", options: ["虫にさされてかゆいので、薬をぬった。", "美容院で髪を茶色にぬった。", "汚れていた革靴をピカピカにぬった。", "スポーツ大会のポスターを壁にぬった。"], answer: 0, note: "「ぬる」 = mengoleskan.\nBenar karena dipakai untuk mengoles obat pada bagian yang gatal." },
      { id: 36, term: "過ごす", options: ["夏は夕方6時を過ごしても、まだ外が明るい。", "左右をよく見てから、横断歩道を過ごしてください。", "夏休みには、いなかの祖父の家でのんびり過ごした。", "この道は車がたくさん過ごすので、気をつけよう。"], answer: 2, note: "「過ごす」 = menghabiskan waktu.\nBenar karena dipakai untuk melewati liburan dengan santai." },
      { id: 37, term: "テーマ", options: ["私はそのテーマに出ている俳優が好きです。", "この二つの小説のテーマは同じです。", "電車の中で携帯電話を使うなんて、テーマを知らない人だ。", "駅のテーマではたくさんの人が電車を待っている。"], answer: 1, note: "「テーマ」 = tema.\nBenar karena dipakai untuk tema dua novel." },
      { id: 38, term: "おおざっぱ", options: ["旅行の費用はおおざっぱに計算して、5万円です。", "試験の朝、寝坊した妹はおおざっぱに家を出ていった。", "この寺の建物は天井が高く、柱が太くて、とてもおおざっぱだ。", "あんなに大きな失敗をした社員を許すなんて、社長は心がおおざっぱだ。"], answer: 0, note: "「おおざっぱ」 = secara kasar / perkiraan besar.\nBenar karena dipakai saat menghitung biaya secara kira-kira." },
      { id: 39, term: "いきいき", options: ["ゲームをしているとき、彼はいきいきして、すごく楽しそうだ。", "道が渋滞していて、車がいきいき動いている。", "いきいきしないで、早く準備をしなさい。", "新しく発売された車はいきいき売れて、あっという間に売り切れた。"], answer: 0, note: "「いきいき」 = hidup / penuh semangat.\nBenar karena dipakai saat seseorang terlihat sangat ceria." },
      { id: 40, term: "手間", options: ["手間のカーテンとソファーを新しくした。", "今日の宿題は難しくて、長い手間がかかった。", "この仕事は私一人では無理だ。だれかの手間がないとできない。", "いつも忙しいので、手間のかかる料理は作らない。"], answer: 3, note: "「手間」 = repot / butuh banyak usaha.\nBenar karena dipakai untuk masakan yang memakan banyak tenaga dan waktu." },
      { id: 41, term: "ひどい", options: ["ボクシングをはじめてまだ1年なのに、オリンピックに出るなんてひどいね。", "今度の試験の成績はひどかった。すっかり自信がなくなってしまった。", "彼女は遅刻ばかりしていて、職場ではひどい人だと思われている。", "動物の世界ではひどい者がリーダーになる。"], answer: 1, note: "「ひどい」 = parah / buruk.\nBenar karena dipakai untuk nilai ujian yang sangat jelek." },
      { id: 42, term: "申し込む", options: ["レストランで一番高い料理を申し込んだ。", "会議で自分の意見を申し込んだ。", "先生にお礼を申し込みたいと思っています。", "テニスクラブに入会を申し込んだ。"], answer: 3, note: "「申し込む」 = mendaftar / mengajukan permohonan.\nBenar karena dipakai saat mengajukan masuk klub tenis." },
      { id: 43, term: "少なくとも", options: ["休みの日は少なくともうちにいますが、昨日は出かけました。", "酒に弱い彼女は、ビールを少なくとも飲むと顔が赤くなる。", "あ、そんなにいりません。少なくともでけっこうです。", "そのテストに合格するためには少なくとも70点必要だ。"], answer: 3, note: "「少なくとも」 = setidaknya / paling tidak.\nBenar karena dipakai untuk menyebut nilai minimum yang dibutuhkan." },
      { id: 44, term: "油断", options: ["一瞬の油断で試合に負けてしまった。", "午後から雨と風が強くなるので、油断が必要です。", "熱が下がったから、もう油断だ。", "どうしたらいいのか、私一人では油断ができなかった。"], answer: 0, note: "「油断」 = lengah.\nBenar karena dipakai saat kalah karena lengah sesaat." },
      { id: 45, term: "ゆずる", options: ["地震で建物が激しくゆずった。", "となりのご主人は会うといつも「こんにちは」と声をゆずってくれる。", "電車の中でお年寄りに席をゆずった。", "友だちが車で駅までゆずってくれた。"], answer: 2, note: "「ゆずる」 = memberikan / mempersilakan.\nBenar karena dipakai saat memberi kursi kepada orang tua." },
      { id: 46, term: "ひとりでに", options: ["だれも乗っていないのに、ひとりでに車が動き出した。", "「スタート」の声と同時に、選手全員がひとりでに走り出した。", "課長が病気で休みなので、ひとりでに私が会議に出た。", "許可なしに、ひとりでに中に入らないでください。"], answer: 0, note: "「ひとりでに」 = dengan sendirinya.\nBenar karena dipakai saat mobil bergerak sendiri tanpa orang di dalamnya." },
      { id: 47, term: "明け方", options: ["明け方になると、商店街には晩御飯のための買い物をする人がやってくる。", "明け方の新聞によると、今日台風が関東地方に近づくそうだ。", "受験生の姉は毎日明け方まで勉強している。", "明け方と夕方、1日に2回、食事の後に薬を飲んでいる。"], answer: 2, note: "「明け方」 = menjelang pagi / dini hari.\nBenar karena dipakai saat belajar sampai menjelang pagi." },
      { id: 48, term: "ゆでる", options: ["やかんでお湯をゆでた。", "さとうとしょうゆで魚をゆでて食べた。", "えびと野菜を180度の油でゆでて、てんぷらを作った。", "野菜を、やわらかくなるまでゆでてください。"], answer: 3, note: "「ゆでる」 = merebus.\nBenar karena dipakai untuk merebus sayur sampai lunak." },
      { id: 49, term: "そっくり", options: ["もっと大きな声でそっくり答えなさい。", "兄は父と顔がそっくりだ。", "彼はまじめだから、クラスの代表にそっくりだ。", "運動した後でシャワーを浴びると、そっくりします。"], answer: 1, note: "「そっくり」 = sangat mirip.\nBenar karena dipakai saat wajah kakak sangat mirip ayah." },
      { id: 50, term: "預かる", options: ["辞書を忘れたので、友だちから預かった。", "しばらくの間、この荷物を預かってもらえませんか。", "ボーナスをもらったら、半分は使わずに預かろうと思います。", "祖父の趣味は世界中の切手を預かることです。"], answer: 1, note: "「預かる」 = menitipkan untuk disimpan / menerima titipan.\nBenar karena dipakai saat meminta orang lain menjaga barang sebentar." }
    ];

    const state = {
      index: 0,
      answers: {},
      showReview: false,
      mode: "all",
      autoNext: false,
      revealResult: false,
      timerSeconds: 1200,
      timerRunning: false,
      timerHandle: null,
      examMode: false
    };

    const el = {
      answered: document.querySelector("#answered"),
      correct: document.querySelector("#correct"),
      wrong: document.querySelector("#wrong"),
      score: document.querySelector("#score"),
      progress: document.querySelector("#progress"),
      questionNo: document.querySelector("#questionNo"),
      questionText: document.querySelector("#questionText"),
      choices: document.querySelector("#choices"),
      prevBtn: document.querySelector("#prevBtn"),
      nextBtn: document.querySelector("#nextBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      reviewBtn: document.querySelector("#reviewBtn"),
      reviewTitle: document.querySelector("#reviewTitle"),
      reviewPanel: document.querySelector("#reviewPanel"),
      reviewList: document.querySelector("#reviewList"),
      navGrid: document.querySelector("#navGrid"),
      allMode: document.querySelector("#allMode"),
      wrongMode: document.querySelector("#wrongMode"),
      minutesInput: document.querySelector("#minutesInput"),
      startTimerBtn: document.querySelector("#startTimerBtn"),
      pauseTimerBtn: document.querySelector("#pauseTimerBtn"),
      stopTimerBtn: document.querySelector("#stopTimerBtn"),
      finishNowBtn: document.querySelector("#finishNowBtn"),
      autoNextBtn: document.querySelector("#autoNextBtn"),
      timerDisplay: document.querySelector("#timerDisplay")
    };

    function pool() {
      if (state.mode === "wrong") {
        const wrong = questions.filter((q) => state.answers[q.id] !== undefined && state.answers[q.id] !== q.answer);
        return wrong.length ? wrong : questions;
      }
      return questions;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function currentQuestion() {
      const items = pool();
      state.index = Math.max(0, Math.min(state.index, items.length - 1));
      return items[state.index];
    }

    function buildPattern(term) {
      if (term.endsWith("する")) return new RegExp(escapeRegex(term.slice(0, -2)) + "[ぁ-んー]*", "u");
      if (/[るうくぐすつぬぶむふぷぴぱぼぽどとろよい]$/.test(term)) return new RegExp(escapeRegex(term.slice(0, -1)) + "[ぁ-んー]*", "u");
      return new RegExp(escapeRegex(term), "u");
    }

    function escapeRegex(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightTerm(text, term) {
      const source = String(text);
      const match = source.match(buildPattern(term));
      if (!match || match.index === undefined) return escapeHtml(source);
      const token = match[0];
      const at = match.index;
      return escapeHtml(source.slice(0, at)) + '<span class="marked">' + escapeHtml(token) + "</span>" + escapeHtml(source.slice(at + token.length));
    }

    function stats() {
      const answeredCount = questions.filter((q) => state.answers[q.id] !== undefined).length;
      const correctCount = questions.filter((q) => state.answers[q.id] === q.answer).length;
      const wrongCount = questions.filter((q) => state.answers[q.id] !== undefined && state.answers[q.id] !== q.answer).length;
      return {
        answeredCount,
        correctCount,
        wrongCount,
        percentage: questions.length ? Math.round((correctCount / questions.length) * 100) : 0
      };
    }

    function formatTimer(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function stopTimer() {
      if (state.timerHandle) clearInterval(state.timerHandle);
      state.timerHandle = null;
      state.timerRunning = false;
    }

    function startTimer() {
      stopTimer();
      const mins = Math.max(1, Number(el.minutesInput.value || 20));
      state.timerSeconds = mins * 60;
      state.revealResult = false;
      state.examMode = true;
      state.timerRunning = true;
      state.timerHandle = setInterval(() => {
        state.timerSeconds = Math.max(0, state.timerSeconds - 1);
        if (state.timerSeconds === 0) {
          stopTimer();
          state.revealResult = true;
        }
        render();
      }, 1000);
      render();
    }

    function finishNow() {
      if (!state.examMode) return;
      stopTimer();
      state.revealResult = true;
      render();
    }

    function render() {
      const items = pool();
      const q = currentQuestion();
      const selected = state.answers[q.id];
      const summary = stats();
      const showLive = !(state.examMode && !state.revealResult);

      el.answered.textContent = summary.answeredCount + "/" + questions.length;
      el.correct.textContent = showLive ? String(summary.correctCount) : "0";
      el.wrong.textContent = showLive ? String(summary.wrongCount) : "0";
      el.score.textContent = showLive ? summary.percentage + "%" : "-";
      el.progress.style.width = ((summary.answeredCount / Math.max(questions.length, 1)) * 100) + "%";

      el.questionNo.textContent = "Soal " + q.id + " / " + questions.length;
      el.timerDisplay.textContent = formatTimer(state.timerSeconds);
      el.autoNextBtn.textContent = "Auto Next: " + (state.autoNext ? "ON" : "OFF");
      el.allMode.classList.toggle("active", state.mode === "all");
      el.wrongMode.classList.toggle("active", state.mode === "wrong");
      el.questionText.innerHTML = '<p class="term-label">' + escapeHtml(q.term) + '</p><p class="term-sub">Pilih kalimat dengan penggunaan kata yang paling tepat.</p>';

      el.choices.innerHTML = "";
      [0, 1, 2, 3].forEach((choiceIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        if (state.revealResult && selected !== undefined && q.answer === choiceIndex) button.classList.add("correct");
        if (state.revealResult && selected !== undefined && selected === choiceIndex && q.answer !== choiceIndex) button.classList.add("wrong");
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = String(choiceIndex + 1);
        const text = document.createElement("span");
        text.className = "choice-text";
        text.innerHTML = highlightTerm(q.options[choiceIndex], q.term);
        button.append(badge, text);
        button.addEventListener("click", () => {
          state.answers[q.id] = choiceIndex;
          state.showReview = true;
          if (state.autoNext && state.index < pool().length - 1) state.index += 1;
          render();
        });
        el.choices.append(button);
      });

      el.prevBtn.disabled = state.index === 0;
      el.nextBtn.disabled = state.index === items.length - 1;
      el.reviewBtn.disabled = selected === undefined;
      el.reviewBtn.textContent = state.showReview ? "Tutup review" : "Review jawaban";
      el.reviewPanel.classList.toggle("show", state.showReview);

      renderNav(q.id);
      if (state.showReview) renderReview();
    }

    function renderNav(currentId) {
      el.navGrid.innerHTML = "";
      questions.forEach((q) => {
        const a = state.answers[q.id];
        const button = document.createElement("button");
        button.type = "button";
        button.className = "nav-btn";
        if (q.id === currentId) button.classList.add("current");
        if (a !== undefined && !state.revealResult) button.classList.add("answered");
        if (state.revealResult && a !== undefined) button.classList.add(a === q.answer ? "correct" : "wrong");
        button.textContent = q.id;
        button.addEventListener("click", () => {
          state.mode = "all";
          state.index = q.id - 1;
          render();
        });
        el.navGrid.append(button);
      });
    }

    function renderReview() {
      el.reviewList.innerHTML = "";
      const q = currentQuestion();
      const a = state.answers[q.id];
      if (a === undefined) {
        el.reviewList.innerHTML = '<div class="review-item">Jawab dulu soal ini untuk melihat isi review.</div>';
        return;
      }
      const ok = a === q.answer;
      const item = document.createElement("div");
      item.className = "review-item";
      el.reviewTitle.textContent = "Review soal " + q.id;
      item.innerHTML =
        "<strong>【" + q.id + "】 正解 " + (q.answer + 1) + " ✓</strong>" +
        '<div style="margin-top:6px;"><span class="' + (ok ? "ok" : "no") + '">Pilihanmu: ' + (a + 1) + "</span></div>" +
        '<div style="margin-top:8px;">Kata: <span class="marked">' + escapeHtml(q.term) + "</span></div>" +
        '<div style="margin-top:8px;"><strong>Kalimat yang benar:</strong><br>' + highlightTerm(q.options[q.answer], q.term) + "</div>" +
        '<div class="review-note">' + escapeHtml(q.note) + "</div>";
      el.reviewList.append(item);
    }

    el.prevBtn.addEventListener("click", () => {
      state.index = Math.max(0, state.index - 1);
      render();
    });

    el.nextBtn.addEventListener("click", () => {
      state.index = Math.min(pool().length - 1, state.index + 1);
      render();
    });

    el.resetBtn.addEventListener("click", () => {
      if (Object.keys(state.answers).length && !confirm("Reset semua jawaban dari awal?")) return;
      state.index = 0;
      state.answers = {};
      state.showReview = false;
      state.mode = "all";
      state.revealResult = false;
      stopTimer();
      render();
    });

    el.reviewBtn.addEventListener("click", () => {
      const q = currentQuestion();
      if (state.answers[q.id] === undefined) return;
      state.showReview = !state.showReview;
      render();
    });

    el.allMode.addEventListener("click", () => {
      state.mode = "all";
      state.index = 0;
      render();
    });

    el.wrongMode.addEventListener("click", () => {
      state.mode = "wrong";
      state.index = 0;
      render();
    });

    el.autoNextBtn.addEventListener("click", () => {
      state.autoNext = !state.autoNext;
      render();
    });

    el.startTimerBtn.addEventListener("click", startTimer);
    el.pauseTimerBtn.addEventListener("click", () => {
      if (!state.examMode) return;
      if (state.timerRunning) {
        stopTimer();
      } else if (state.timerSeconds > 0 && !state.revealResult) {
        state.timerRunning = true;
        state.timerHandle = setInterval(() => {
          state.timerSeconds = Math.max(0, state.timerSeconds - 1);
          if (state.timerSeconds === 0) {
            stopTimer();
            state.revealResult = true;
          }
          render();
        }, 1000);
      }
      render();
    });

    el.stopTimerBtn.addEventListener("click", () => {
      stopTimer();
      state.examMode = false;
      state.revealResult = false;
      state.timerSeconds = Math.max(1, Number(el.minutesInput.value || 20)) * 60;
      render();
    });

    el.finishNowBtn.addEventListener("click", finishNow);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft" && !el.prevBtn.disabled) {
        event.preventDefault();
        el.prevBtn.click();
      }
      if (event.key === "ArrowRight" && !el.nextBtn.disabled) {
        event.preventDefault();
        el.nextBtn.click();
      }
    });

    render();
  </script>
</body>
</html>
